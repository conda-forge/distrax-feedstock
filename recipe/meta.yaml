{% set name = "distrax" %}
{% set version = "0.1.7" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/google-deepmind/distrax/archive/v{{ version }}.tar.gz
  sha256: 66ad1adc84c592c6a3e225103e0af902d2247a4b76b5bb3e8dbbf4b3e2904cc2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - flit
  run:
    - python >={{ python_min }}
    - absl-py >=2.3.1
    - chex >=0.1.90
    - jax >=0.7.0
    - jaxlib >=0.7.0
    - numpy >=1.24.1
    - tensorflow-probability >=0.25.0

test:
  requires:
    - python {{ python_min }}
    - pytest
    - dm-haiku
    - flax
    - mock
  imports:
    - distrax
  commands:
    - JAX_DISABLE_MOST_OPTIMIZATIONS=True pytest --pyargs distrax -k 'not _float64_test'

about:
  home: https://github.com/deepmind/distrax
  summary: 'Distrax: Probability distributions in JAX.'
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - traversaro
    - flferretti
